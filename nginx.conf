worker_processes auto;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;

    # Map for conditional WebSocket upgrade headers
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 80;
        server_name _;

        # WebSocket proxy → terminal-server on host
        # Rewrite /spaces/ws → /ws so dev server's pathname check matches
        location /spaces/ws {
            proxy_pass http://host.docker.internal:3457/ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Cookie $http_cookie;
            proxy_read_timeout 86400;
            proxy_send_timeout 86400;
        }

        # Next.js SSR + API + static assets → Next.js on host
        # Pass through /spaces/ prefix — Next.js basePath handles it
        # Includes WebSocket upgrade support for HMR (_next/webpack-hmr)
        location /spaces/ {
            proxy_pass http://host.docker.internal:3457/spaces/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
